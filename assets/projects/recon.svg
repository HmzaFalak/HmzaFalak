<svg xmlns="[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)" viewBox="0 0 270 200" width="100%" height="200">
  <defs>
    <style>
      @import url('[https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600&amp;family=Inter:wght@400;500&amp;family=JetBrains+Mono&amp;display=swap](https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600&amp;family=Inter:wght@400;500&amp;family=JetBrains+Mono&amp;display=swap)');
      .title { font-family: 'Space Grotesk', sans-serif; font-size: 14px; fill: #e2e8f0; font-weight: 600; }
      .desc { font-family: 'Inter', sans-serif; font-size: 11px; fill: #94a3b8; font-weight: 400; }
      .meta { font-family: 'JetBrains Mono', monospace; font-size: 10px; fill: #22c55e; }
      .card-bg { fill: #071428; stroke: rgba(255,255,255,0.06); stroke-width: 1; rx: 16px; }
      .icon-box { fill: #0f172a; stroke: rgba(255,255,255,0.08); stroke-width: 1; rx: 8px; }
    </style>
  </defs>
  <rect width="100%" height="100%" class="card-bg" />
  <g transform="translate(24, 24)">
    <rect width="36" height="36" class="icon-box" />
    <circle cx="18" cy="18" r="6" fill="none" stroke="#22c55e" stroke-width="1.5"/>
    <line x1="18" y1="8" x2="18" y2="28" stroke="#22c55e" stroke-width="1"/>
    <line x1="8" y1="18" x2="28" y2="18" stroke="#22c55e" stroke-width="1"/>
  </g>
  <text x="24" y="85" class="title">Attack Surface Mapping</text>
  <text x="246" y="85" class="meta" text-anchor="end">Recon</text>
  <text x="24" y="110" class="desc">Active network reconnaissance</text>
  <text x="24" y="128" class="desc">• Detected IP data exposure issues</text>
  <text x="24" y="144" class="desc">• Disclosed host infrastructure vulnerabilities</text>
</svg>
