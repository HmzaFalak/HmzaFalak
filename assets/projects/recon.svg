<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 180" width="260" height="180">
  <defs>
    <style type="text/css"><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600&family=Inter:wght@400&family=JetBrains+Mono&display=swap');
      .card-title { font-family: 'Space Grotesk', sans-serif; font-size: 15px; fill: #e2e8f0; font-weight: 600; }
      .card-desc { font-family: 'Inter', sans-serif; font-size: 12px; fill: #94a3b8; line-height: 1.5; }
      .card-code { font-family: 'JetBrains Mono', monospace; font-size: 10px; fill: #e2e8f0; opacity: 0.7; }
    ]]></style>
  </defs>
  <rect width="260" height="180" rx="16" fill="#071428" stroke="rgba(226, 232, 240, 0.1)" stroke-width="1.5"/>
  <rect x="15" y="15" width="35" height="35" rx="8" fill="#020617" stroke="rgba(226, 232, 240, 0.2)" stroke-width="1"/>
  <circle cx="32.5" cy="32.5" r="6" stroke="#e2e8f0" stroke-width="2" fill="none"/>
  <line x1="37" y1="37" x2="43" y2="43" stroke="#e2e8f0" stroke-width="2" stroke-linecap="round"/>
  <text x="65" y="37" class="card-title">Surface Mapping</text>
  <text x="15" y="75" class="card-desc">OSINT, subdomain discovery,</text>
  <text x="15" y="93" class="card-desc">and perimeter enumeration</text>
  <text x="15" y="111" class="card-desc">to minimize attack vectors.</text>
  <rect x="15" y="138" width="90" height="22" rx="4" fill="#020617"/>
  <text x="23" y="152" class="card-code">RECON: ENGAGED</text>
</svg>
