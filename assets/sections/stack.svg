<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 200" width="100%" height="200">
  <defs>
    <style type="text/css"><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500&family=JetBrains+Mono&display=swap');
      .stack-title { font-family: 'Space Grotesk', sans-serif; font-size: 13px; fill: #94a3b8; font-weight: 500; letter-spacing: 0.06em; }
      .tag-bg { fill: #071428; stroke: rgba(59, 130, 246, 0.25); stroke-width: 1; }
      .tag-bg-green { fill: #071428; stroke: rgba(34, 197, 94, 0.25); stroke-width: 1; }
      .tag-text { font-family: 'JetBrains Mono', monospace; font-size: 12px; fill: #e2e8f0; }
    ]]></style>
  </defs>
  
  <!-- Main Dashboard Container Card -->
  <rect width="850" height="200" rx="16" fill="#040b14" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  
  <!-- ROW 1 (LEFT): ENVIRONMENTS & OPERATING SYSTEMS -->
  <text x="40" y="35" class="stack-title">OS &amp; ENVIRONMENTS</text>
  <g transform="translate(40, 50)">
    <rect width="100" height="32" rx="6" class="tag-bg"/>
    <text x="50" y="21" text-anchor="middle" class="tag-text">Kali Linux</text>
  </g>
  <g transform="translate(150, 50)">
    <rect width="90" height="32" rx="6" class="tag-bg"/>
    <text x="45" y="21" text-anchor="middle" class="tag-text">Parrot OS</text>
  </g>
  <g transform="translate(250, 50)">
    <rect width="105" height="32" rx="6" class="tag-bg"/>
    <text x="52.5" y="21" text-anchor="middle" class="tag-text">Linux/Bash</text>
  </g>

  <!-- ROW 1 (RIGHT): SECURITY & AUDITING TOOLKITS -->
  <text x="390" y="35" class="stack-title">SECURITY &amp; AUDITING TOOLKITS</text>
  <g transform="translate(390, 50)">
    <rect width="100" height="32" rx="6" class="tag-bg-green"/>
    <text x="50" y="21" text-anchor="middle" class="tag-text">Burp Suite</text>
  </g>
  <g transform="translate(500, 50)">
    <rect width="70" height="32" rx="6" class="tag-bg-green"/>
    <text x="35" y="21" text-anchor="middle" class="tag-text">Nmap</text>
  </g>
  <g transform="translate(580, 50)">
    <rect width="100" height="32" rx="6" class="tag-bg-green"/>
    <text x="50" y="21" text-anchor="middle" class="tag-text">Metasploit</text>
  </g>
  <g transform="translate(690, 50)">
    <rect width="110" height="32" rx="6" class="tag-bg-green"/>
    <text x="55" y="21" text-anchor="middle" class="tag-text">OWASP ZAP</text>
  </g>
  
  <!-- ROW 2: LANGUAGES & UTILITIES -->
  <text x="40" y="120" class="stack-title">LANGUAGES &amp; UTILITIES</text>
  <g transform="translate(40, 135)">
    <rect width="90" height="32" rx="6" class="tag-bg" stroke-dasharray="3,3"/>
    <text x="45" y="21" text-anchor="middle" class="tag-text" fill="#94a3b8">Python 3</text>
  </g>
  <g transform="translate(140, 135)">
    <rect width="100" height="32" rx="6" class="tag-bg" stroke-dasharray="3,3"/>
    <text x="50" y="21" text-anchor="middle" class="tag-text" fill="#94a3b8">Wireshark</text>
  </g>
  <g transform="translate(250, 135)">
    <rect width="110" height="32" rx="6" class="tag-bg" stroke-dasharray="3,3"/>
    <text x="55" y="21" text-anchor="middle" class="tag-text" fill="#94a3b8">Git/GitHub</text>
  </g>
</svg>
