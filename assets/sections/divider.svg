<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 10" width="100%" height="10">
  <defs>
    <linearGradient id="div-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0"/>
      <stop offset="15%" stop-color="#22c55e" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#3b82f6" stop-opacity="1"/>
      <stop offset="85%" stop-color="#22c55e" stop-opacity="0.6"/>
