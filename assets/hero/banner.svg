<svg xmlns="[http://www.w3.org/2000/svg](http://www.w3.org/2000/svg)" viewBox="0 0 1200 340" width="100%" height="340">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="50%" stop-color="#071428"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="glass-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="accent-green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#064e3b" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#22c55e" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#047857" stop-opacity="0.4"/>
    </linearGradient>
    
    <pattern id="hex-grid" width="24" height="41.569" patternUnits="userSpaceOnUse">
      <path d="M12 0 L24 6.928 L24 20.784 L12 27.712 L0 20.784 L0 6.928 Z M12 41.569 L24 34.641 L24 20.784 L12 27.712 L0 20.784 L0 34.641 Z" 
            fill="none" stroke="#94a3b8" stroke-width="1" stroke-opacity="0.04"/>
    </pattern>

    <style>
      @import url('[https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&amp;family=Inter:wght@400;500&amp;family=JetBrains+Mono&amp;display=swap](https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&amp;family=Inter:wght@400;500&amp;family=JetBrains+Mono&amp;display=swap)');
      .text-title { font-family: 'Space Grotesk', sans-serif; font-weight: 700; fill: #e2e8f0; letter-spacing: 0.18em; font-size: 24px; }
      .text-sub { font-family: 'Inter', sans-serif; font-weight: 400; fill: #94a3b8; letter-spacing: 0.1em; font-size: 12px; }
      .text-mono { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #64748b; letter-spacing: 0.05em; }
      .text-status { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: #22c55e; font-weight: 600; }
      .text-indicator { font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 10px; fill: #e2e8f0; letter-spacing: 0.05em; }
      
      @keyframes pulse { 0%, 100% { opacity: 0.35; } 50% { opacity: 1; } }
      @keyframes scan { 0% { transform: translateY(-10px); opacity: 0; } 10%, 90% { opacity: 0.12; } 100% { transform: translateY(350px); opacity: 0; } }
      @keyframes trace { 0%, 100% { stroke-opacity: 0.04; } 50% { stroke-opacity: 0.3; stroke: #22c55e; } }
      
      .pulsing-green { animation: pulse 2.s infinite ease-in-out; }
      .scanning-line { animation: scan 7s infinite linear; }
      .circuit-line { animation: trace 6s infinite ease-in-out; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg-grad)"/>
  <rect width="100%" height="100%" fill="url(#hex-grid)"/>

  <!-- Scanning Overlay -->
  <line class="scanning-line" x1="0" y1="0" x2="1200" y2="0" stroke="#22c55e" stroke-width="1.5" />

  <!-- Technical Node Traces -->
  <g fill="none" stroke="#22c55e" stroke-opacity="0.06" stroke-width="1">
    <path class="circuit-line" d="M 60,170 L 160,170 L 210,120 L 320,120" />
    <path class="circuit-line" d="M 1140,170 L 1040,170 L 990,220 L 880,220" />
  </g>

  <!-- Central Glassmorphic Dashboard Box -->
  <g transform="translate(175, 85)">
    <rect width="850" height="170" rx="24" fill="url(#glass-grad)" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
    <path d="M 24,0 L 826,0" stroke="url(#accent-green)" stroke-width="1.5" fill="none"/>
    
    <!-- Top Left Secom Status -->
    <g transform="translate(35, 30)">
      <circle class="pulsing-green" cx="6" cy="6" r="5" fill="#22c55e"/>
      <text x="24" y="10" class="text-status">AUDIT_ACTIVE</text>
    </g>

    <text x="815" y="40" class="text-mono" text-anchor="end">NODE: ISLAMABAD // HU_B2</text>

    <!-- Content Sizing -->
    <text x="425" y="76" class="text-title" text-anchor="middle">MUHAMMAD HAMZA FALAK SHER</text>
    <text x="425" y="106" class="text-sub" text-anchor="middle">
      PENETRATION TESTING   •   WEB APPLICATION SECURITY   •   VULNERABILITY RESEARCH
    </text>

    <!-- Bottom Matrix Telemetry States -->
    <g transform="translate(125, 135)">
      <g transform="translate(0, 0)">
        <rect width="10" height="10" rx="2" fill="#22c55e"/>
        <text x="18" y="9" class="text-indicator">RECON : ACTIVE</text>
      </g>
      <g transform="translate(155, 0)">
        <rect width="10" height="10" rx="2" fill="#22c55e"/>
        <text x="18" y="9" class="text-indicator">PENTEST : ACTIVE</text>
      </g>
      <g transform="translate(325, 0)">
        <rect width="10" height="10" rx="2" fill="#3b82f6"/>
        <text x="18" y="9" class="text-indicator">WEB_SEC : ACTIVE</text>
      </g>
      <g transform="translate(495, 0)">
        <rect width="10" height="10" rx="2" fill="#e2e8f0" opacity="0.7"/>
        <text x="18" y="9" class="text-indicator">AUDIT : LIVE</text>
      </g>
    </g>
  </g>
</svg>
